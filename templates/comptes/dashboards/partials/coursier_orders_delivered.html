{% for order in orders_delivered %}
<div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg border border-gray-200">
    <div class="flex-1">
        <div class="flex items-center gap-3 mb-2">
            <p class="font-semibold text-gray-900">#{{ order.order_number }}</p>
            <span class="text-xs px-2 py-1 rounded-full bg-green-100 text-green-800">
                {{ order.get_status_display }}
            </span>
        </div>
        <p class="text-sm text-gray-600 mb-1">{{ order.shipping_address|truncatewords:10 }}</p>
        <p class="text-xs text-gray-500">Livrée le {{ order.delivered_at|date:"d M Y H:i" }}</p>
    </div>
    <div class="text-right ml-4">
        <p class="font-bold text-gray-900">{{ order.total_amount|floatformat:0 }} FCFA</p>
    </div>
</div>
{% endfor %}
