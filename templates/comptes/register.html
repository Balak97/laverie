{% extends 'home.html' %}
{% load static %}


{% block contenu %}

<div class="flex items-center justify-center py-8 px-4">
  <div class="max-w-md w-full space-y-8">
    <div class="bg-white shadow-sm rounded-xl p-8 border border-gray-200">
      <h2 class="text-center text-2xl font-bold text-gray-800 mb-6">Créer un compte</h2>

      <form method="post" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}

        {% for field in form %}
          <div>
            <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
              {{ field.label }}
            </label>
            {{ field }}
            
            {% if field.errors %}
              <p class="text-red-500 text-xs mt-1">{{ field.errors|join:", " }}</p>
            {% endif %}
          </div>
        {% endfor %}

        <div>
          <button type="submit"
                  class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-semibold py-3 px-4 rounded-lg shadow-sm hover:shadow-md transition">
            Créer le compte
          </button>
        </div>
      </form>
    </div>

    <p class="text-center text-sm text-gray-600">
      Vous avez déjà un compte ?
      <a href="{% url 'login' %}" class="text-cyan-500 hover:text-cyan-600 font-medium hover:underline">Se connecter</a>
    </p>
  </div>
</div>

{% endblock %}
