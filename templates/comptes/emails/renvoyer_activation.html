{% extends 'home.html' %}
{% block contenu %}

<div class="max-w-md mx-auto bg-white shadow-lg rounded-lg p-6 mt-35">
    <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Renvoyer le lien d’activation</h2>

    {% if error %}
        <div class="mb-4 text-red-600 text-sm text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <input
            type="email"
            name="email"
            required
            placeholder="Votre adresse e-mail"
            class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
        <button
            type="submit"
            class="w-full bg-blue-600 text-white font-medium py-2 rounded-md hover:bg-blue-700 transition-colors"
        >
            Renvoyer le lien
        </button>
    </form>
</div>

{% endblock %}
